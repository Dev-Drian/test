version: "3.8"

services:
  couchdb:
    image: couchdb:3
    container_name: couchdb_veterinaria
    ports:
      - "5984:5984"
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=password
    volumes:
      - couchdb_data:/opt/couchdb/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_queues
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  couchdb_data:
  redis_data:
